# ---- PREFIX -------------------------------------------------

# Change prefix from Ctrl+b → Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---- GENERAL -----------------------------------------------

# Enable mouse support
set -g mouse on
bind -n MouseMove select-pane -t=

# Faster key repeat
set -s escape-time 0

# Better scrolling
set -g history-limit 100000

# Prevent programs from renaming windows
set -g allow-rename off
set-window-option -g automatic-rename off

# ---- SPLITS ------------------------------------------------

# Remove weird default splits
unbind '"'
unbind %

# Use = and - for splits
bind = split-window -h
bind - split-window -v

# ---- PANE NAVIGATION ---------------------------------------

# Switch panes with Ctrl+a + arrow keys
bind Up    select-pane -U
bind Down  select-pane -D
bind Left  select-pane -L
bind Right select-pane -R

# Resize panes with Ctrl+a + HJKL
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5

# ---- WINDOWS -----------------------------------------------

# Easier window switching
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ---- PANE MANAGEMENT ---------------------------------------

# Kill pane / window / session
bind x kill-pane
bind w kill-window
bind k kill-session

# Toggle pane zoom
bind z resize-pane -Z

# ---- WINDOW NAVIGATION -------------------------------------
# Switch windows with Alt + arrows (no prefix)
bind -n M-Up   select-window -p
bind -n M-Down select-window -n

# ---- RELOAD CONFIG -----------------------------------------

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# ---- PLUGINS (tpm) -----------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'

# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Catppuccin theme
set -g @plugin 'catppuccin/tmux'

# ---- CATPPUCCIN CONFIG -------------------------------------

# Theme flavor
set -g @catppuccin_flavor 'mocha'

# Window styling
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Status bar
set -g @catppuccin_status_background "default"
set -g status-position top

# Directory and application modules
set -g @catppuccin_directory_text "#{b:pane_current_path}"

# Pane borders: bright active, dim inactive
set -g @catppuccin_pane_status_enabled "no"
set -g @catppuccin_pane_active_border_style "fg=#b4befe"
set -g @catppuccin_pane_border_style "fg=#45475a"

# ---- TPM INIT (must be last) ------------------------------
run '~/.tmux/plugins/tmux/catppuccin.tmux'
run '~/.tmux/plugins/tpm/tpm'

# These must come AFTER catppuccin loads (no E: prefix for dynamic vars)
set -gF status-right "#{@catppuccin_status_session}"
set -ga status-right " #(~/.tmux/scripts/claude-usage.sh)"
set -g status-right-length 100
set -g status-left ""

# Pane border: show repo (branch) for git dirs, directory name otherwise
# Active pane gets colored label, inactive is dim
set -g pane-border-status bottom
set -g pane-border-format "#{?pane_active,#[fg=#1e1e2e bg=#fab387] ,#[fg=#1e1e2e bg=#45475a] } #(basename `git -C #{pane_current_path} rev-parse --show-toplevel 2>/dev/null || echo #{pane_current_path}`)#{?#{!=:#(git -C #{pane_current_path} branch --show-current 2>/dev/null),}, (#(git -C #{pane_current_path} branch --show-current 2>/dev/null)),}#(~/.tmux/scripts/pane-title.sh '#{pane_title}')#(~/.tmux/scripts/pane-cmd.sh '#{pane_current_command}') #{?pane_active,#[fg=#fab387 bg=default],#[fg=#45475a bg=default]}#[default]"
set -g status-interval 5
